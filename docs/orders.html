<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FashionStore</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/checkout.css">
</head>
<body>

    <!-- GLOBAL NAVBAR -->
    <header id="global-header"></header>

    <!-- ORDERS CONTAINER -->
    <main class="container">
        <h1 class="checkout-section-title" style="font-size: 28px; margin-bottom: 24px;">Your Orders History</h1>
        
        <div class="orders-list" id="orders-list-container">
            <!-- Loaded dynamically -->
        </div>
    </main>

    <!-- GLOBAL FOOTER -->
    <footer id="global-footer"></footer>

    <!-- SCRIPTS -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const listContainer = document.getElementById("orders-list-container");
            if (!listContainer) return;

            // Check auth
            const currentUser = checkAuth();
            if (!currentUser) return; // app.js checkAuth will redirect

            const allOrders = JSON.parse(localStorage.getItem("orders")) || [];
            
            // Filter orders for current logged-in user
            const userOrders = allOrders.filter(o => o.userId === currentUser.userId).reverse(); // newest first

            if (userOrders.length === 0) {
                listContainer.innerHTML = `
                    <div style="text-align: center; background-color: var(--white); padding: 60px 40px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--dark-muted); opacity:0.5; margin-bottom: 20px;"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        <h2 style="font-family: var(--font-heading); font-size:24px; font-weight:700; margin-bottom:8px;">No Orders Found</h2>
                        <p style="color:var(--dark-muted); margin-bottom:24px;">You haven't placed any orders yet. Explore our latest fashion drops!</p>
                        <a href="products.html" class="btn">Shop The Drops</a>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = userOrders.map(order => `
                <div class="order-card fade-in">
                    <!-- Order Card Header -->
                    <div class="order-header">
                        <div class="order-meta-group">
                            <div class="order-meta-item">
                                <span class="order-meta-label">Order Number</span>
                                <span class="order-meta-value">#${order.orderId}</span>
                            </div>
                            <div class="order-meta-item">
                                <span class="order-meta-label">Date Placed</span>
                                <span class="order-meta-value">${order.orderDate}</span>
                            </div>
                            <div class="order-meta-item">
                                <span class="order-meta-label">Total Amount</span>
                                <span class="order-meta-value" style="color: var(--primary); font-weight: 700;">₹${order.totalAmount.toLocaleString("en-IN")}</span>
                            </div>
                            <div class="order-meta-item">
                                <span class="order-meta-label">Payment Method</span>
                                <span class="order-meta-value">${order.paymentMethod}</span>
                            </div>
                        </div>

                        <span class="order-status-badge status-placed">${order.orderStatus}</span>
                    </div>

                    <!-- Order Card Body Details -->
                    <div class="order-details-body">
                        <div style="font-size:12.5px; color:var(--dark-muted); margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
                            <strong>Delivery Address:</strong> ${order.deliveryAddress}
                        </div>
                        
                        <div class="order-items-grid">
                            ${order.items.map(item => `
                                <div class="order-item-detail-row">
                                    <div class="order-item-title-desc">
                                        <span class="order-item-name">${item.productName}</span>
                                        <span class="order-item-meta-txt">Size: ${item.sizeLabel} | Qty: ${item.quantity} | Unit Price: ₹${item.unitPrice.toLocaleString("en-IN")}</span>
                                    </div>
                                    <div class="order-item-subtotal">
                                        ₹${item.subtotal.toLocaleString("en-IN")}
                                    </div>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                </div>
            `).join("");
        });
    </script>
</body>
</html>
